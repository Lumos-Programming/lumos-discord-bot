services:
  firestore:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    environment:
      CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
      CLOUDSDK_CORE_PROJECT: "demo-test"
    command: >
      bash -lc
      "gcloud -q beta emulators firestore start --host-port=0.0.0.0:8080"
    ports:
      - "8080:8080"

